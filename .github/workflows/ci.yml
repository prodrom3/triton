name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["1.23", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        shell: bash
        run: go build -ldflags "-X main.version=$(cat VERSION | tr -d '[:space:]')" -o triton .

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Verify --version flag
        shell: bash
        run: go run -ldflags "-X main.version=$(cat VERSION | tr -d '[:space:]')" . --version

      - name: Verify -h flag
        run: go run . -h || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet
        run: go vet ./...

      - name: Static check
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
